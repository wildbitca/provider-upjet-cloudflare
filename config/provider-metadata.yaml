    cloudflare_magic_network_monitoring_rule:
        subCategory: ""
        description: Accepted Permissions Magic Network Monitoring AdminMagic Network Monitoring Config ReadMagic Network Monitoring Config Write
        name: cloudflare_magic_network_monitoring_rule
        title: cloudflare_magic_network_monitoring_rule Resource - Cloudflare
        examples:
