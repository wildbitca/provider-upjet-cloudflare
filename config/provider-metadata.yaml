    cloudflare_zero_trust_tunnel_warp_connector_config:
        subCategory: ""
        description: 'Accepted Permissions Cloudflare One Connector: WARP ReadCloudflare One Connector: WARP WriteCloudflare One Connectors ReadCloudflare One Connectors Write'
        name: cloudflare_zero_trust_tunnel_warp_connector_config
