    cloudflare_flagship_flag:
        subCategory: ""
        description: 'Accepted Permissions Account Firewall Access Rules ReadAccount Firewall Access Rules WriteAccount Settings ReadAccount Settings WriteBilling ReadBilling WriteDDoS Botnet Feed ReadDDoS Botnet Feed WriteDDoS Protection ReadDDoS Protection WriteDNS Firewall ReadDNS Firewall WriteDNS View ReadDNS View WriteLoad Balancers Account ReadLoad Balancers Account WriteLoad Balancing: Monitors and Pools ReadLoad Balancing: Monitors and Pools WriteSCIM ProvisioningTrust and Safety ReadTrust and Safety WriteWorkers KV Storage ReadWorkers KV Storage WriteWorkers R2 Storage ReadWorkers R2 Storage WriteWorkers Scripts ReadWorkers Scripts WriteWorkers Tail ReadZero Trust: PII Read'
        name: cloudflare_flagship_flag
        title: cloudflare_flagship_flag Resource - Cloudflare
        examples:
            - name: example_flagship_flag
              manifest: |-
                {
                  "account_id": "account_id",
                  "app_id": "app_id",
                  "default_variation": "x",
                  "description": "description",
                  "enabled": true,
                  "key": "x",
                  "rules": [
                    {
                      "conditions": [
                        {
                          "attribute": "x",
                          "operator": "equals",
                          "value": {}
                        }
                      ],
                      "priority": 1,
                      "rollout": {
                        "attribute": "x",
                        "percentage": 0
                      },
                      "serve_variation": "x"
                    }
                  ],
                  "type": "boolean",
                  "variations": {
                    "foo": "string"
                  }
                }
        argumentDocs:
            account_id: (String) Cloudflare account ID.
            app_id: (String) App identifier.
            attribute: (String)
            clauses: (Attributes List) (see below for nested schema)
            conditions: (Attributes List) Conditions the context must satisfy for this rule to match. An empty array matches all contexts. (see below for nested schema)
            default_variation: (String) Variation served when no rule matches or the flag is disabled. Must be a key in variations.
            description: (String)
            enabled: (Boolean) When false, the flag bypasses all rules and always serves default_variation.
            flag_key: (String) Flag key (slug).
            key: (String) Unique identifier for the flag within an app. Used in all evaluation and SDK calls.
            logical_operator: '(String) Available values: "AND", "OR".'
            operator: '(String) Available values: "equals", "not_equals", "greater_than", "less_than", "greater_than_or_equals", "less_than_or_equals", "contains", "starts_with", "ends_with", "in", "not_in".'
            percentage: (Number) Percentage of matching traffic (0–100) served this variation. For multi-way splits, use cumulative upper bounds across rules (e.g. 30, 70, 100).
            priority: (Number) Evaluation order; lower numbers are evaluated first. Must be unique across the flag's rules.
            rollout: (Attributes) (see below for nested schema)
            rules: (Attributes List) Targeting rules evaluated in ascending priority; the first matching rule wins. An empty array means the flag always serves default_variation. (see below for nested schema)
            serve_variation: (String) Variation served when this rule matches. Must be a key in variations.
            type: |-
                (String) Value type of the flag's variations. Inferred from the variation values on write, so it may be omitted in requests.
                Available values: "boolean", "string", "number", "json".
            updated_at: (String)
            updated_by: (String)
            value: (String) Value to compare against the context attribute. Must be an array for in and not_in; numeric and ISO-8601 datetime strings are accepted by the ordering operators.
            variations: (Map of String) Map of variation name to value. All values must be the same type (boolean, string, number, or JSON object/array). Each serialized value must be 10KB or smaller.
        importStatements: []
