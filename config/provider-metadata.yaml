            request_body: (Map of String) OpenAPI request body object describing the expected request payload.
            requests: (Number) The estimated number of requests covered by these calculations.
            responses: (String) An empty response object. This field is required to yield a valid operation schema.
            route: (String) Target route.
            schema_info: (Attributes) (see below for nested schema)
            schemas: (Attributes) OpenAPI JSON schemas for an operation, including both user-uploaded and Cloudflare-learned schemas. (see below for nested schema)
            suggested_threshold: (Attributes) (see below for nested schema)
            thresholds: (Attributes) (see below for nested schema)
            uploaded: (Attributes) An OpenAPI operation object fragment containing schema information for an operation. May include parameter definitions, request body specifications, and a component schema extension. (see below for nested schema)
            upper: (Number) Upper bound for percentile estimate
            zone_id: (String) Identifier.
