                  },
                  "ha_mode": "aws",
                  "tunnel_id": "f70ff985-a4ef-4643-bbbc-4a0ed4fc8415"
                }
        argumentDocs:
            account_id: (String) Identifier.
            address: (String) Virtual IP address (IPv4 or IPv6).
            config: (Attributes) Provider-specific configuration. Required shape depends on ha_mode. For aws, must contain fnr_id. For local, must contain vips. For none and disabled, must be empty or omitted. (see below for nested schema)
            configuration_version: (Number) Monotonically increasing configuration version, incremented on each PUT.
            created_at: (String) Timestamp of when the resource was created.
            fnr_id: (String) Floating Network Resource ID — the secondary ENI that is moved between nodes on failover.
            ha_mode: |-
                (String) High-availability mode for the WARP Connector tunnel. none means HA is enabled but no provider is configured yet (newly created tunnels default to this). disabled means HA is explicitly turned off. aws uses AWS ENI move for failover. local uses virtual IPs (VIPs) on the local interface.
                Available values: "none", "disabled", "aws", "local".
            id: (String) UUID of the tunnel.
            tunnel_id: (String) UUID of the tunnel.
            updated_at: (String) Timestamp of the last update. Null if never updated.
            vips: (Attributes List) VIPs to assign on the CloudflareWARP interface. (see below for nested schema)
            vips_previous: (Attributes List) VIPs to clean up on demotion or version drift. (see below for nested schema)
