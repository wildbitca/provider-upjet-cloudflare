        name: cloudflare_ai_search_instance Resource - Cloudflare
        title: cloudflare_ai_search_instance Resource - Cloudflare
        argumentDocs:
            account_id: (String)
            ai_gateway_id: (String)
            aisearch_model: '(String) Available values: "@cf/meta/llama-3.3-70b-instruct-fp8-fast", "@cf/zai-org/glm-4.7-flash", "@cf/meta/llama-3.1-8b-instruct-fast", "@cf/meta/llama-3.1-8b-instruct-fp8", "@cf/meta/llama-4-scout-17b-16e-instruct", "@cf/qwen/qwen3-30b-a3b-fp8", "@cf/deepseek-ai/deepseek-r1-distill-qwen-32b", "@cf/moonshotai/kimi-k2-instruct", "@cf/google/gemma-3-12b-it", "@cf/google/gemma-4-26b-a4b-it", "@cf/moonshotai/kimi-k2.5", "anthropic/claude-3-7-sonnet", "anthropic/claude-sonnet-4", "anthropic/claude-opus-4", "anthropic/claude-3-5-haiku", "cerebras/qwen-3-235b-a22b-instruct", "cerebras/qwen-3-235b-a22b-thinking", "cerebras/llama-3.3-70b", "cerebras/llama-4-maverick-17b-128e-instruct", "cerebras/llama-4-scout-17b-16e-instruct", "cerebras/gpt-oss-120b", "google-ai-studio/gemini-2.5-flash", "google-ai-studio/gemini-2.5-pro", "grok/grok-4", "groq/llama-3.3-70b-versatile", "groq/llama-3.1-8b-instant", "openai/gpt-5", "openai/gpt-5-mini", "openai/gpt-5-nano", "".'
            authorized_hosts: (List of String)
            boost_by: (Attributes List) Metadata fields to boost search results by. Each entry specifies a metadata field and an optional direction. Direction defaults to 'asc' for numeric/datetime fields and 'exists' for text/boolean fields. Fields must match 'timestamp' or a defined custom_metadata field. (see below for nested schema)
            cache: (Boolean)
            cache_threshold: '(String) Available values: "super_strict_match", "close_enough", "flexible_friend", "anything_goes".'
            cache_ttl: |-
                (Number) Cache entry TTL in seconds. Allowed values: 600 (10min), 1800 (30min), 3600 (1h), 7200 (2h), 21600 (6h), 43200 (12h), 86400 (24h), 172800 (48h), 259200 (72h), 518400 (6d).
                Available values: 600, 1800, 3600, 7200, 21600, 43200, 86400, 172800, 259200, 518400.
            chat_completions_endpoint: (Attributes) (see below for nested schema)
            chunk: (Boolean)
            chunk_overlap: (Number)
            chunk_size: (Number)
            content_selector: (Attributes List) List of path-to-selector mappings for extracting specific content from crawled pages. Each entry pairs a URL glob pattern with a CSS selector. The first matching path wins. Only the matched HTML fragment is stored and indexed. Omit the field to disable content selection — empty arrays are rejected. (see below for nested schema)
            crawl_options: (Attributes) (see below for nested schema)
            created_at: (String)
            created_by: (String)
            created_from_aisearch_wizard: (Boolean)
            custom_metadata: (Attributes List) (see below for nested schema)
            data_type: '(String) Available values: "text", "number", "boolean", "datetime".'
            depth: (Number)
            description: (String)
            direction: |-
                (String) Boost direction. 'desc' = higher values rank higher (e.g. newer timestamps). 'asc' = lower values rank higher. 'exists' = boost chunks that have the field. 'not_exists' = boost chunks that lack the field. Optional — defaults to 'asc' for numeric/datetime fields, 'exists' for text/boolean fields.
                Available values: "asc", "desc", "exists", "not_exists".
            disabled: (Boolean) Disable chat completions endpoint for this public endpoint
            embedding_model: '(String) Available values: "@cf/qwen/qwen3-embedding-0.6b", "@cf/baai/bge-m3", "@cf/baai/bge-large-en-v1.5", "@cf/google/embeddinggemma-300m", "google-ai-studio/gemini-embedding-001", "google-ai-studio/gemini-embedding-2-preview", "openai/text-embedding-3-small", "openai/text-embedding-3-large", "".'
            enable: (Boolean)
            enabled: (Boolean)
            engine_version: (Number)
            exclude_items: '(List of String) List of path patterns to exclude. Uses micromatch glob syntax: * matches within a path segment, ** matches across path segments (e.g., /admin/** matches /admin/users and /admin/settings/advanced)'
            field: (String) Metadata field name to boost by. Use 'timestamp' for document freshness, or any custom_metadata field. Numeric and datetime fields support all four directions (asc, desc, exists, not_exists); text/boolean fields only support exists/not_exists.
            field_name: (String)
            fusion_method: '(String) Available values: "max", "rrf".'
            hybrid_search_enabled: (Boolean, Deprecated) Deprecated — use index_method instead.
            id: (String) AI Search instance ID. Lowercase alphanumeric, hyphens, and underscores.
            include_external_links: (Boolean)
            include_headers: (Map of String) Up to 5 custom HTTP headers sent with each crawl request. Names must be RFC-7230 token characters (no spaces, colons, or control characters); values must be HTAB + printable ASCII (no CR/LF).
            include_images: (Boolean)
            include_items: '(List of String) List of path patterns to include. Uses micromatch glob syntax: * matches within a path segment, ** matches across path segments (e.g., /blog/** matches /blog/post and /blog/2024/post)'
            include_subdomains: (Boolean)
            index_method: (Attributes) Controls which storage backends are used during indexing. Defaults to vector-only. (see below for nested schema)
            indexing_options: (Attributes) (see below for nested schema)
            keyword: (Boolean) Enable keyword (BM25) storage backend.
            keyword_match_mode: |-
                (String) Controls which documents are candidates for BM25 scoring. 'and' restricts candidates to documents containing all query terms; 'or' includes any document containing at least one term, ranked by BM25 relevance. Defaults to 'and'.
                Available values: "and", "or".
            keyword_tokenizer: |-
                (String) Tokenizer used for keyword search indexing. porter provides word-level tokenization with Porter stemming (good for natural language queries). trigram enables character-level substring matching (good for partial matches, code, identifiers). Changing this triggers a full re-index. Defaults to porter.
                Available values: "porter", "trigram".
            last_activity: (String)
            max_age: (Number)
            max_num_results: (Number)
            mcp: (Attributes) (see below for nested schema)
            metadata: (Attributes) (see below for nested schema)
            modified_at: (String)
            modified_by: (String)
            namespace: (String)
            parse_options: (Attributes) (see below for nested schema)
            parse_type: '(String) Available values: "sitemap", "feed-rss", "crawl".'
            path: '(String) Glob pattern to match against the page URL path. Uses standard glob syntax: * matches within a segment, ** crosses directories.'
            paused: (Boolean)
            period_ms: (Number)
            prefix: (String)
            public_endpoint_id: (String)
            public_endpoint_params: (Attributes) (see below for nested schema)
            r2_jurisdiction: (String)
            rate_limit: (Attributes) (see below for nested schema)
            requests: (Number)
            reranking: (Boolean)
            reranking_model: '(String) Available values: "@cf/baai/bge-reranker-base", "".'
            retrieval_options: (Attributes) (see below for nested schema)
            rewrite_model: '(String) Available values: "@cf/meta/llama-3.3-70b-instruct-fp8-fast", "@cf/zai-org/glm-4.7-flash", "@cf/meta/llama-3.1-8b-instruct-fast", "@cf/meta/llama-3.1-8b-instruct-fp8", "@cf/meta/llama-4-scout-17b-16e-instruct", "@cf/qwen/qwen3-30b-a3b-fp8", "@cf/deepseek-ai/deepseek-r1-distill-qwen-32b", "@cf/moonshotai/kimi-k2-instruct", "@cf/google/gemma-3-12b-it", "@cf/google/gemma-4-26b-a4b-it", "@cf/moonshotai/kimi-k2.5", "anthropic/claude-3-7-sonnet", "anthropic/claude-sonnet-4", "anthropic/claude-opus-4", "anthropic/claude-3-5-haiku", "cerebras/qwen-3-235b-a22b-instruct", "cerebras/qwen-3-235b-a22b-thinking", "cerebras/llama-3.3-70b", "cerebras/llama-4-maverick-17b-128e-instruct", "cerebras/llama-4-scout-17b-16e-instruct", "cerebras/gpt-oss-120b", "google-ai-studio/gemini-2.5-flash", "google-ai-studio/gemini-2.5-pro", "grok/grok-4", "groq/llama-3.3-70b-versatile", "groq/llama-3.1-8b-instant", "openai/gpt-5", "openai/gpt-5-mini", "openai/gpt-5-nano", "".'
            rewrite_query: (Boolean)
            score_threshold: (Number)
            search_endpoint: (Attributes) (see below for nested schema)
            selector: (String) CSS selector to extract content from pages matching the path pattern. Must not contain disallowed characters (;, `, $, {, }, ). Must target a single element; if multiple elements match, the selector is ignored and the full page is used.
            source: (String)
            source_params: (Attributes) (see below for nested schema)
            specific_sitemaps: (List of String) List of specific sitemap URLs to use for crawling. Only valid when parse_type is 'sitemap'.
            status: (String)
            storage_id: (String)
            storage_type: '(String) Available values: "r2".'
            store_options: (Attributes) (see below for nested schema)
            summarization: (Boolean)
            summarization_model: '(String) Available values: "@cf/meta/llama-3.3-70b-instruct-fp8-fast", "@cf/zai-org/glm-4.7-flash", "@cf/meta/llama-3.1-8b-instruct-fast", "@cf/meta/llama-3.1-8b-instruct-fp8", "@cf/meta/llama-4-scout-17b-16e-instruct", "@cf/qwen/qwen3-30b-a3b-fp8", "@cf/deepseek-ai/deepseek-r1-distill-qwen-32b", "@cf/moonshotai/kimi-k2-instruct", "@cf/google/gemma-3-12b-it", "@cf/google/gemma-4-26b-a4b-it", "@cf/moonshotai/kimi-k2.5", "anthropic/claude-3-7-sonnet", "anthropic/claude-sonnet-4", "anthropic/claude-opus-4", "anthropic/claude-3-5-haiku", "cerebras/qwen-3-235b-a22b-instruct", "cerebras/qwen-3-235b-a22b-thinking", "cerebras/llama-3.3-70b", "cerebras/llama-4-maverick-17b-128e-instruct", "cerebras/llama-4-scout-17b-16e-instruct", "cerebras/gpt-oss-120b", "google-ai-studio/gemini-2.5-flash", "google-ai-studio/gemini-2.5-pro", "grok/grok-4", "groq/llama-3.3-70b-versatile", "groq/llama-3.1-8b-instant", "openai/gpt-5", "openai/gpt-5-mini", "openai/gpt-5-nano", "".'
            sync_interval: |-
                (Number) Interval between automatic syncs, in seconds. Allowed values: 900 (15min), 1800 (30min), 3600 (1h), 7200 (2h), 14400 (4h), 21600 (6h), 43200 (12h), 86400 (24h).
                Available values: 900, 1800, 3600, 7200, 14400, 21600, 43200, 86400.
            system_prompt_aisearch: (String)
            system_prompt_index_summarization: (String)
            system_prompt_rewrite_query: (String)
            technique: '(String) Available values: "fixed", "sliding".'
