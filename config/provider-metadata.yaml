    cloudflare_zero_trust_organization:
        subCategory: ""
        description: 'Accepted Permissions Access: Organizations, Identity Providers, and Groups ReadAccess: Organizations, Identity Providers, and Groups RevokeAccess: Organizations, Identity Providers, and Groups Write'
        name: cloudflare_zero_trust_organization
        title: cloudflare_zero_trust_organization Resource - Cloudflare
        examples:
            - name: example_zero_trust_organization
              manifest: |-
                {
                  "allow_authenticate_via_warp": true,
                  "auth_domain": "test.cloudflareaccess.com",
                  "auto_redirect_to_identity": true,
                  "custom_pages": {
                    "forbidden": "699d98642c564d2e855e9661899b7252",
                    "identity_denied": "699d98642c564d2e855e9661899b7252"
                  },
                  "deny_unmatched_requests": true,
                  "deny_unmatched_requests_exempted_zone_names": [
                    "example.com"
                  ],
                  "is_ui_read_only": true,
                  "login_design": {
                    "background_color": "#c5ed1b",
                    "footer_text": "This is an example description.",
                    "header_text": "This is an example description.",
                    "logo_path": "https://example.com/logo.png",
                    "text_color": "#c5ed1b"
                  },
                  "mfa_config": {
                    "allowed_authenticators": [
                      "totp",
                      "biometrics",
                      "security_key"
                    ],
                    "amr_matching_session_duration": "12h",
                    "required_aaguids": "2fc0579f-8113-47ea-b116-bb5a8db9202a",
                    "session_duration": "24h"
                  },
                  "mfa_required_for_all_apps": false,
                  "mfa_ssh_piv_key_requirements": {
                    "pin_policy": "always",
                    "require_fips_device": true,
                    "ssh_key_size": [
                      256,
                      2048
                    ],
                    "ssh_key_type": [
                      "ecdsa",
                      "rsa"
                    ],
                    "touch_policy": "always"
                  },
                  "name": "Widget Corps Internal Applications",
                  "session_duration": "24h",
                  "ui_read_only_toggle_reason": "Temporarily turn off the UI read only lock to make a change via the UI",
                  "user_seat_expiration_inactive_time": "730h",
                  "warp_auth_session_duration": "24h",
                  "zone_id": "zone_id"
                }
        argumentDocs:
            account_id: (String) The Account ID to use for this endpoint. Mutually exclusive with the Zone ID.
            allow_authenticate_via_warp: (Boolean) When set to true, users can authenticate via WARP for any application in your organization. Application settings will take precedence over this value.
            allowed_authenticators: (List of String) Lists the MFA methods that users can authenticate with. ssh_piv_key is only relevant for infrastructure applications.
            amr_matching_session_duration: '(String) Allows a user to skip MFA via Authentication Method Reference (AMR) matching when the AMR claim provided by the IdP the user used to authenticate contains "mfa". Must be in minutes (m) or hours (h). Minimum: 0m. Maximum: 720h (30 days).'
            auth_domain: (String) The unique subdomain assigned to your Zero Trust organization.
            auto_redirect_to_identity: (Boolean) When set to true, users skip the identity provider selection step during login.
            background_color: (String) The background color on your login page.
            custom_pages: (Attributes) (see below for nested schema)
            deny_unmatched_requests: (Boolean) Determines whether to deny all requests to Cloudflare-protected resources that lack an associated Access application. If enabled, you must explicitly configure an Access application and policy to allow traffic to your Cloudflare-protected resources. For domains you want to be public across all subdomains, add the domain to the deny_unmatched_requests_exempted_zone_names array.
            deny_unmatched_requests_exempted_zone_names: (List of String) Contains zone names to exempt from the deny_unmatched_requests feature. Requests to a subdomain in an exempted zone will block unauthenticated traffic by default if there is a configured Access application and policy that matches the request.
            footer_text: (String) The text at the bottom of your login page.
            forbidden: (String) The uid of the custom page to use when a user is denied access after failing a non-identity rule.
            header_text: (String) The text at the top of your login page.
            identity_denied: (String) The uid of the custom page to use when a user is denied access.
            is_ui_read_only: (Boolean) Lock all settings as Read-Only in the Dashboard, regardless of user permission. Updates may only be made via the API or Terraform for this account when enabled.
            login_design: (Attributes) (see below for nested schema)
            logo_path: (String) The URL of the logo on your login page.
            mfa_config: (Attributes) Configures multi-factor authentication (MFA) settings for an organization. (see below for nested schema)
            mfa_configuration_allowed: (Boolean) Indicates if this organization can enforce multi-factor authentication (MFA) requirements at the application and policy level.
            mfa_required_for_all_apps: '(Boolean) Determines whether global MFA settings apply to applications by default. The organization must have MFA enabled with at least one authentication method and a session duration configured. Note: ''allowed_authenticators'' cannot only contain ''ssh_piv_key'' if the organization has any non-infrastructure applications because PIV keys are only compatible with infrastructure apps.'
            mfa_ssh_piv_key_requirements: (Attributes) Configures SSH PIV key requirements for MFA using hardware security keys. (see below for nested schema)
            name: (String) The name of your Zero Trust organization.
            pin_policy: |-
                (String) Defines when a PIN is required to use the SSH key. Valid values: never (no PIN required), once (PIN required once per session), always (PIN required for each use).
                Available values: "never", "once", "always".
            require_fips_device: (Boolean) Requires the SSH PIV key to be stored on a FIPS 140-2 Level 1 or higher validated device.
            required_aaguids: (String) Specifies a Cloudflare List of required FIDO2 authenticator device AAGUIDs.
            session_duration: '(String) The amount of time that tokens issued for applications will be valid. Must be in the format 300ms or 2h45m. Valid time units are: ns, us (or µs), ms, s, m, h.'
            ssh_key_size: (List of Number) Specifies the allowed SSH key sizes in bits. Valid sizes depend on key type. Ed25519 has a fixed key size and does not accept this parameter.
            ssh_key_type: (List of String) Specifies the allowed SSH key types. Valid values are ecdsa, ed25519, and rsa.
            text_color: (String) The text color on your login page.
            touch_policy: |-
                (String) Defines when physical touch is required to use the SSH key. Valid values: never (no touch required), always (touch required for each use), cached (touch cached for 15 seconds).
                Available values: "never", "always", "cached".
            ui_read_only_toggle_reason: (String) A description of the reason why the UI read only field is being toggled.
            user_seat_expiration_inactive_time: '(String) The amount of time a user seat is inactive before it expires. When the user seat exceeds the set time of inactivity, the user is removed as an active seat and no longer counts against your Teams seat count.  Minimum value for this setting is 1 month (730h). Must be in the format 300ms or 2h45m. Valid time units are: ns, us (or µs), ms, s, m, h.'
            warp_auth_session_duration: '(String) The amount of time that tokens issued for applications will be valid. Must be in the format 30m or 2h45m. Valid time units are: m, h.'
            zone_id: (String) The Zone ID to use for this endpoint. Mutually exclusive with the Account ID.
        importStatements: []
