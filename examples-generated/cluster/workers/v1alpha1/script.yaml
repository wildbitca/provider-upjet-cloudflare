apiVersion: workers.upjet-cloudflare.upbound.io/v1alpha1
kind: Script
metadata:
  annotations:
    meta.upbound.io/example-id: workers/v1alpha1/script
  labels:
    testing.upbound.io/example-name: example_workers_script
  name: example-workers-script
spec:
  forProvider:
    accountId: 023e105f4ecef8ad9ca31a8372d0c353
    assets:
      config:
        headers: |2
                  /dashboard/*
                  X-Frame-Options: DENY

                  /static/*
                  Access-Control-Allow-Origin: *
        htmlHandling: auto-trailing-slash
        notFoundHandling: 404-page
        redirects: |2
                  /foo /bar 301
                  /news/* /blog/:splat
        runWorkerFirst: []
        serveDirectly: true
      jwtSecretRef:
        key: example-key
        name: example-secret
        namespace: upbound-system
    bindings:
    - name: MY_ENV_VAR
      textSecretRef:
        key: example-key
        name: example-secret
        namespace: upbound-system
      type: plain_text
    bodyPart: worker.js
    compatibilityDate: "2021-01-01"
    compatibilityFlags:
    - nodejs_compat
    keepAssets: false
    keepBindings:
    - string
    limits:
      cpuMs: 50
      subrequests: 1000
    logpush: false
    mainModule: worker.js
    migrations:
      deletedClasses:
      - string
      newClasses:
      - string
      newSqliteClasses:
      - string
      newTag: v2
      oldTag: v1
      renamedClasses:
      - from: from
        to: to
      transferredClasses:
      - from: from
        fromScript: from_script
        to: to
    observability:
      enabled: true
      headSamplingRate: 0.1
      logs:
        destinations:
        - cloudflare
        enabled: true
        headSamplingRate: 0.1
        invocationLogs: true
        persist: true
      traces:
        destinations:
        - cloudflare
        enabled: true
        headSamplingRate: 0.1
        persist: true
    placement:
      mode: smart
    scriptName: this-is_my_script-01
    tags:
    - string
    tailConsumers:
    - environment: production
      namespace: my-namespace
      service: my-log-consumer
    usageModel: standard
