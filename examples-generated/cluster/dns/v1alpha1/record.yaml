apiVersion: dns.upjet-cloudflare.upbound.io/v1alpha1
kind: Record
metadata:
  annotations:
    meta.upbound.io/example-id: dns/v1alpha1/record
  labels:
    testing.upbound.io/example-name: example_dns_record
  name: example-dns-record
spec:
  forProvider:
    comment: Domain verification record
    content: 198.51.100.4
    name: example.com
    proxied: true
    settings:
      ipv4Only: true
      ipv6Only: true
    tags:
    - owner:dns-team
    ttl: 3600
    type: A
    zoneIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
