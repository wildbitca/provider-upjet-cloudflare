apiVersion: worker.upjet-cloudflare.upbound.io/v1alpha1
kind: Version
metadata:
  annotations:
    meta.upbound.io/example-id: worker/v1alpha1/version
  labels:
    testing.upbound.io/example-name: example_worker_version
  name: example-worker-version
spec:
  forProvider:
    accountId: 023e105f4ecef8ad9ca31a8372d0c353
    annotations:
      workersMessage: Fixed bug.
      workersTag: v1.0.1
    assets:
      config:
        htmlHandling: auto-trailing-slash
        notFoundHandling: 404-page
        runWorkerFirst: []
      jwtSecretRef:
        key: example-key
        name: example-secret
        namespace: upbound-system
    bindings:
    - name: MY_ENV_VAR
      textSecretRef:
        key: example-key
        name: example-secret
        namespace: upbound-system
      type: plain_text
    cacheOptions:
      crossVersionCache: true
      enabled: true
    compatibilityDate: "2021-01-01"
    compatibilityFlags:
    - nodejs_compat
    containers:
    - className: MyDurableObject
    limits:
      cpuMs: 50
      subrequests: 1000
    mainModule: index.js
    migrations:
      deletedClasses:
      - string
      newClasses:
      - string
      newSqliteClasses:
      - string
      newTag: v2
      oldTag: v1
      renamedClasses:
      - from: from
        to: to
      transferredClasses:
      - from: from
        fromScript: from_script
        to: to
    modules:
    - contentFile: dist/index.js
      contentType: application/javascript+module
      name: index.js
    packageDependencies:
    - installedVersion: 4.17.22
      name: lodash
      packageJsonVersion: ^4.17.21
    placement:
      mode: smart
    workerId: worker_id
