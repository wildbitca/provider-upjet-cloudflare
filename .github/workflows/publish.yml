name: Publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: "Version override (default: git tag)"
        default: ''
        required: false

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

env:
  GO_VERSION: '1.24'
  DOCKER_BUILDX_VERSION: 'v0.30.1'
  UPBOUND_REGISTRY: xpkg.upbound.io/wildbitca
  OPENTOFU_VERSION: '1.11.5'
  TERRAFORM_PROVIDER_SOURCE: cloudflare/cloudflare
  TERRAFORM_PROVIDER_VERSION: '5.18.0'
  TERRAFORM_PROVIDER_DOWNLOAD_NAME: terraform-provider-cloudflare
  TERRAFORM_PROVIDER_DOWNLOAD_URL_PREFIX: https://github.com/cloudflare/terraform-provider-cloudflare/releases/download/v5.18.0
  TERRAFORM_NATIVE_PROVIDER_BINARY: terraform-provider-cloudflare_v5.18.0

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Resolve version
        id: version
        run: |
          V="${{ github.event.inputs.version }}"
          echo "version=${V:-${{ github.ref_name }}}" >> $GITHUB_OUTPUT

  # ── Ensure Upbound repos exist (parallel with builds) ─────────────────
  ensure-repos:
    runs-on: ubuntu-24.04
    needs: prepare
    steps:
      - name: Install up CLI
        run: |
          curl -sLo up "https://cli.upbound.io/stable/current/bin/linux_amd64/up"
          chmod +x up
          sudo mv up /usr/local/bin/up

      - name: Authenticate with Upbound
        run: up login -t "${{ secrets.UPBOUND_TOKEN }}"

      - name: Ensure repos exist
        run: |
          REPOS=(
            provider-cloudflare
            provider-family-cloudflare
            provider-cloudflare-access
            provider-cloudflare-account
            provider-cloudflare-address
            provider-cloudflare-ai
            provider-cloudflare-api
            provider-cloudflare-argo
            provider-cloudflare-authenticated
            provider-cloudflare-bot
            provider-cloudflare-byo
            provider-cloudflare-calls
            provider-cloudflare-certificate
            provider-cloudflare-cloud
            provider-cloudflare-cloudflare
            provider-cloudflare-cloudforce
            provider-cloudflare-connectivity
            provider-cloudflare-content
            provider-cloudflare-custom
            provider-cloudflare-d1
            provider-cloudflare-dns
            provider-cloudflare-email
            provider-cloudflare-firewall
            provider-cloudflare-hostname
            provider-cloudflare-hyperdrive
            provider-cloudflare-image
            provider-cloudflare-keyless
            provider-cloudflare-leaked
            provider-cloudflare-list
            provider-cloudflare-load
            provider-cloudflare-logpull
            provider-cloudflare-logpush
            provider-cloudflare-magic
            provider-cloudflare-managed
            provider-cloudflare-mtls
            provider-cloudflare-notification
            provider-cloudflare-observatory
            provider-cloudflare-organization
            provider-cloudflare-origin
            provider-cloudflare-page
            provider-cloudflare-pages
            provider-cloudflare-queue
            provider-cloudflare-r2
            provider-cloudflare-rate
            provider-cloudflare-regional
            provider-cloudflare-registrar
            provider-cloudflare-schema
            provider-cloudflare-snippet
            provider-cloudflare-spectrum
            provider-cloudflare-sso
            provider-cloudflare-stream
            provider-cloudflare-tiered
            provider-cloudflare-token
            provider-cloudflare-total
            provider-cloudflare-turnstile
            provider-cloudflare-universal
            provider-cloudflare-url
            provider-cloudflare-user
            provider-cloudflare-waiting
            provider-cloudflare-web
            provider-cloudflare-web3
            provider-cloudflare-worker
            provider-cloudflare-workers
            provider-cloudflare-zero
            provider-cloudflare-zone
          )
          for repo in "${REPOS[@]}"; do
            if ! up repository get "$repo" >/dev/null 2>&1; then
              echo "Creating $repo..."
              up repository create "$repo"
            fi
            up repository update --private=false --publish --force "$repo"
            echo "✓ $repo published"
          done

  # ── Monolith build (all CRDs, multi-arch images + xpkg) ──────────────
  monolith-build:
    runs-on: ubuntu-24.04
    needs: prepare
    outputs:
      version: ${{ needs.prepare.outputs.version }}
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: docker/setup-qemu-action@v4
        with: { platforms: all }

      - uses: docker/setup-buildx-action@v4
        with: { version: '${{ env.DOCKER_BUILDX_VERSION }}' }

      - name: Checkout
        uses: actions/checkout@v6
        with: { fetch-depth: 0, submodules: true }

      - uses: actions/setup-go@v6
        with: { go-version: '${{ env.GO_VERSION }}' }

      - name: Cache Go
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
            .work/pkg
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - run: make vendor vendor.check

      - name: Install Crossplane CLI
        run: |
          curl -sL "https://raw.githubusercontent.com/crossplane/crossplane/master/install.sh" | sh
          sudo mv crossplane /usr/local/bin/crossplane

      - name: Build images
        run: make -j2 build.all
        env:
          BUILD_ARGS: "--load --cache-from type=gha --cache-to type=gha,mode=max"

      - name: Build xpkg
        run: make xpkg.build

      - name: Upload xpkg
        uses: actions/upload-artifact@v4
        with:
          name: monolith-xpkg
          path: _output/xpkg/
          retention-days: 1

  # ── Monolith publish (push xpkg + append extensions) ──────────────────
  monolith-publish:
    runs-on: ubuntu-24.04
    needs: [monolith-build, ensure-repos]
    outputs:
      version: ${{ needs.monolith-build.outputs.version }}
    env:
      VERSION: ${{ needs.monolith-build.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install CLIs
        run: |
          curl -sLo up "https://cli.upbound.io/stable/current/bin/linux_amd64/up"
          chmod +x up
          sudo mv up /usr/local/bin/up
          curl -sLo docker-credential-up "https://cli.upbound.io/stable/current/bin/linux_amd64/docker-credential-up"
          chmod +x docker-credential-up
          sudo mv docker-credential-up /usr/local/bin/docker-credential-up
          curl -sL "https://raw.githubusercontent.com/crossplane/crossplane/master/install.sh" | sh
          sudo mv crossplane /usr/local/bin/crossplane

      - name: Authenticate with Upbound
        run: |
          up login -t "${{ secrets.UPBOUND_TOKEN }}"
          mkdir -p ~/.docker
          config_file=~/.docker/config.json
          if [ -f "$config_file" ]; then
            jq '.credHelpers["xpkg.upbound.io"] = "up"' "$config_file" > "${config_file}.tmp" && mv "${config_file}.tmp" "$config_file"
          else
            echo '{"credHelpers":{"xpkg.upbound.io":"up"}}' > "$config_file"
          fi

      - name: Download xpkg
        uses: actions/download-artifact@v4
        with:
          name: monolith-xpkg
          path: _output/xpkg/

      - name: Push xpkg to Upbound
        run: |
          XPKG_FILES=$(find _output/xpkg/ -name '*.xpkg' | sed 's/^/--package-files /' | tr '\n' ' ')
          crossplane xpkg push ${XPKG_FILES} \
            ${UPBOUND_REGISTRY}/provider-cloudflare:${VERSION}

      - name: Append extensions
        continue-on-error: true
        run: |
          up xpkg append --extensions-root=./extensions \
            "${UPBOUND_REGISTRY}/provider-cloudflare:${VERSION}"

  # ── Family config (ProviderConfig CRDs — must publish before sub-providers) ──
  family-config:
    runs-on: ubuntu-24.04
    needs: [prepare, ensure-repos]
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: docker/setup-buildx-action@v4
        with: { version: '${{ env.DOCKER_BUILDX_VERSION }}' }

      - name: Checkout
        uses: actions/checkout@v6
        with: { submodules: true }

      - uses: actions/setup-go@v6
        with: { go-version: '${{ env.GO_VERSION }}' }

      - name: Cache Go
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
            .work/pkg
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - run: make vendor vendor.check

      - name: Install CLIs
        run: |
          curl -sLo up "https://cli.upbound.io/stable/current/bin/linux_amd64/up"
          chmod +x up
          sudo mv up /usr/local/bin/up
          curl -sLo docker-credential-up "https://cli.upbound.io/stable/current/bin/linux_amd64/docker-credential-up"
          chmod +x docker-credential-up
          sudo mv docker-credential-up /usr/local/bin/docker-credential-up
          curl -sL "https://raw.githubusercontent.com/crossplane/crossplane/master/install.sh" | sh
          sudo mv crossplane /usr/local/bin/crossplane

      - name: Authenticate with Upbound
        run: |
          up login -t "${{ secrets.UPBOUND_TOKEN }}"
          mkdir -p ~/.docker
          config_file=~/.docker/config.json
          if [ -f "$config_file" ]; then
            jq '.credHelpers["xpkg.upbound.io"] = "up"' "$config_file" > "${config_file}.tmp" && mv "${config_file}.tmp" "$config_file"
          else
            echo '{"credHelpers":{"xpkg.upbound.io":"up"}}' > "$config_file"
          fi

      - name: Build binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -trimpath -installsuffix static \
            -ldflags "-X github.com/wildbitca/provider-upjet-cloudflare/internal/version.Version=${VERSION} -s -w" \
            -o _output/bin/linux_amd64/config \
            ./cmd/provider/config/

      - name: Build image and xpkg
        run: |
          REPO="provider-family-cloudflare"

          BUILD_CTX=$(mktemp -d)
          cp cluster/images/provider-upjet-cloudflare/Dockerfile "${BUILD_CTX}/"
          cp cluster/images/provider-upjet-cloudflare/terraformrc.hcl "${BUILD_CTX}/"
          cp -r _output/bin/ "${BUILD_CTX}/bin"

          docker buildx build \
            --platform linux/amd64 \
            --build-arg SUBPACKAGE=config \
            --build-arg OPENTOFU_VERSION=${OPENTOFU_VERSION} \
            --build-arg TERRAFORM_PROVIDER_SOURCE=${TERRAFORM_PROVIDER_SOURCE} \
            --build-arg TERRAFORM_PROVIDER_VERSION=${TERRAFORM_PROVIDER_VERSION} \
            --build-arg TERRAFORM_PROVIDER_DOWNLOAD_NAME=${TERRAFORM_PROVIDER_DOWNLOAD_NAME} \
            --build-arg TERRAFORM_PROVIDER_DOWNLOAD_URL_PREFIX=${TERRAFORM_PROVIDER_DOWNLOAD_URL_PREFIX} \
            --build-arg TERRAFORM_NATIVE_PROVIDER_BINARY=${TERRAFORM_NATIVE_PROVIDER_BINARY} \
            --cache-from type=gha --cache-to type=gha,mode=max \
            -t build-${REPO}:latest --load \
            "${BUILD_CTX}"

          WORK_DIR=$(mktemp -d)
          mkdir -p "${WORK_DIR}/crds"
          cp package/crds/upjet-cloudflare.*.yaml "${WORK_DIR}/crds/" 2>/dev/null || true

          cat > "${WORK_DIR}/crossplane.yaml" <<'YAML'
          apiVersion: meta.pkg.crossplane.io/v1
          kind: Provider
          metadata:
            name: provider-family-cloudflare
            annotations:
              meta.crossplane.io/maintainer: "Wildbit"
              meta.crossplane.io/source: "https://github.com/wildbitca/provider-upjet-cloudflare"
              meta.crossplane.io/license: "Apache-2.0"
            labels:
              pkg.crossplane.io/provider-family: provider-family-cloudflare
          spec:
            capabilities:
              - SafeStart
          YAML
          sed -i 's/^          //' "${WORK_DIR}/crossplane.yaml"

          crossplane xpkg build \
            --embed-runtime-image="build-${REPO}:latest" \
            --package-root="${WORK_DIR}" \
            --package-file="${WORK_DIR}/${REPO}.xpkg"

          up xpkg push "${UPBOUND_REGISTRY}/${REPO}:${VERSION}" \
            -f "${WORK_DIR}/${REPO}.xpkg"

          echo "Published: ${UPBOUND_REGISTRY}/${REPO}:${VERSION}"

      - name: Append extensions
        continue-on-error: true
        run: |
          up xpkg append --extensions-root=./extensions \
            "${UPBOUND_REGISTRY}/provider-family-cloudflare:${VERSION}"

  # ── Family sub-providers (one per API group, parallel after config) ──
  family-subproviders:
    runs-on: ubuntu-24.04
    needs: [prepare, family-config]
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        subpackage:
          - access
          - account
          - address
          - ai
          - api
          - argo
          - authenticated
          - bot
          - byo
          - calls
          - certificate
          - cloud
          - cloudflare
          - cloudforce
          - connectivity
          - content
          - custom
          - d1
          - dns
          - email
          - firewall
          - hostname
          - hyperdrive
          - image
          - keyless
          - leaked
          - list
          - load
          - logpull
          - logpush
          - magic
          - managed
          - mtls
          - notification
          - observatory
          - organization
          - origin
          - page
          - pages
          - queue
          - r2
          - rate
          - regional
          - registrar
          - schema
          - snippet
          - spectrum
          - sso
          - stream
          - tiered
          - token
          - total
          - turnstile
          - universal
          - url
          - user
          - waiting
          - web
          - web3
          - worker
          - workers
          - zero
          - zone
    steps:
      - uses: docker/setup-buildx-action@v4
        with: { version: '${{ env.DOCKER_BUILDX_VERSION }}' }

      - name: Checkout
        uses: actions/checkout@v6
        with: { submodules: true }

      - uses: actions/setup-go@v6
        with: { go-version: '${{ env.GO_VERSION }}' }

      - name: Cache Go
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
            .work/pkg
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - run: make vendor vendor.check

      - name: Install CLIs
        run: |
          curl -sLo up "https://cli.upbound.io/stable/current/bin/linux_amd64/up"
          chmod +x up
          sudo mv up /usr/local/bin/up
          curl -sLo docker-credential-up "https://cli.upbound.io/stable/current/bin/linux_amd64/docker-credential-up"
          chmod +x docker-credential-up
          sudo mv docker-credential-up /usr/local/bin/docker-credential-up
          curl -sL "https://raw.githubusercontent.com/crossplane/crossplane/master/install.sh" | sh
          sudo mv crossplane /usr/local/bin/crossplane

      - name: Authenticate with Upbound
        run: |
          up login -t "${{ secrets.UPBOUND_TOKEN }}"
          mkdir -p ~/.docker
          config_file=~/.docker/config.json
          if [ -f "$config_file" ]; then
            jq '.credHelpers["xpkg.upbound.io"] = "up"' "$config_file" > "${config_file}.tmp" && mv "${config_file}.tmp" "$config_file"
          else
            echo '{"credHelpers":{"xpkg.upbound.io":"up"}}' > "$config_file"
          fi

      - name: Build binary
        run: |
          SP="${{ matrix.subpackage }}"
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -trimpath -installsuffix static \
            -ldflags "-X github.com/wildbitca/provider-upjet-cloudflare/internal/version.Version=${VERSION} -s -w" \
            -o _output/bin/linux_amd64/${SP} \
            ./cmd/provider/${SP}/

      - name: Build image, xpkg and publish
        run: |
          SP="${{ matrix.subpackage }}"
          REPO="provider-cloudflare-${SP}"

          BUILD_CTX=$(mktemp -d)
          cp cluster/images/provider-upjet-cloudflare/Dockerfile "${BUILD_CTX}/"
          cp cluster/images/provider-upjet-cloudflare/terraformrc.hcl "${BUILD_CTX}/"
          cp -r _output/bin/ "${BUILD_CTX}/bin"

          docker buildx build \
            --platform linux/amd64 \
            --build-arg SUBPACKAGE=${SP} \
            --build-arg OPENTOFU_VERSION=${OPENTOFU_VERSION} \
            --build-arg TERRAFORM_PROVIDER_SOURCE=${TERRAFORM_PROVIDER_SOURCE} \
            --build-arg TERRAFORM_PROVIDER_VERSION=${TERRAFORM_PROVIDER_VERSION} \
            --build-arg TERRAFORM_PROVIDER_DOWNLOAD_NAME=${TERRAFORM_PROVIDER_DOWNLOAD_NAME} \
            --build-arg TERRAFORM_PROVIDER_DOWNLOAD_URL_PREFIX=${TERRAFORM_PROVIDER_DOWNLOAD_URL_PREFIX} \
            --build-arg TERRAFORM_NATIVE_PROVIDER_BINARY=${TERRAFORM_NATIVE_PROVIDER_BINARY} \
            --cache-from type=gha --cache-to type=gha,mode=max \
            -t build-${REPO}:latest --load \
            "${BUILD_CTX}"

          WORK_DIR=$(mktemp -d)
          mkdir -p "${WORK_DIR}/crds"
          cp package/crds/${SP}.upjet-cloudflare.*.yaml "${WORK_DIR}/crds/" 2>/dev/null || true

          CRD_COUNT=$(find "${WORK_DIR}/crds/" -name '*.yaml' 2>/dev/null | wc -l)
          echo "${SP}: ${CRD_COUNT} CRDs"

          cat > "${WORK_DIR}/crossplane.yaml" <<YAML
          apiVersion: meta.pkg.crossplane.io/v1
          kind: Provider
          metadata:
            name: ${REPO}
            annotations:
              meta.crossplane.io/maintainer: "Wildbit"
              meta.crossplane.io/source: "https://github.com/wildbitca/provider-upjet-cloudflare"
              meta.crossplane.io/license: "Apache-2.0"
            labels:
              pkg.crossplane.io/provider-family: provider-family-cloudflare
          spec:
            dependsOn:
              - provider: ${UPBOUND_REGISTRY}/provider-family-cloudflare
                version: ">= ${VERSION}"
            capabilities:
              - SafeStart
          YAML
          sed -i 's/^          //' "${WORK_DIR}/crossplane.yaml"

          crossplane xpkg build \
            --embed-runtime-image="build-${REPO}:latest" \
            --package-root="${WORK_DIR}" \
            --package-file="${WORK_DIR}/${REPO}.xpkg"

          up xpkg push "${UPBOUND_REGISTRY}/${REPO}:${VERSION}" \
            -f "${WORK_DIR}/${REPO}.xpkg"

          echo "Published: ${UPBOUND_REGISTRY}/${REPO}:${VERSION}"

      - name: Append extensions
        continue-on-error: true
        run: |
          SP="${{ matrix.subpackage }}"
          up xpkg append --extensions-root=./extensions \
            "${UPBOUND_REGISTRY}/provider-cloudflare-${SP}:${VERSION}"

  # ── GitHub Release ────────────────────────────────────────────────────
  release:
    runs-on: ubuntu-24.04
    needs: [monolith-publish, family-subproviders]
    if: always() && needs.monolith-publish.result == 'success'
    env:
      VERSION: ${{ needs.monolith-publish.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${VERSION}" >/dev/null 2>&1; then
            echo "Release ${VERSION} already exists"
          else
            gh release create "${VERSION}" \
              --title "${VERSION}" \
              --generate-notes
          fi
