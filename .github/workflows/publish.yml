name: Publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: "Version override (default: git tag)"
        default: ''
        required: false
      packages:
        description: >
          Sub-providers to publish. Comma-separated list (e.g. "zero,dns") or
          "all" / empty to publish every sub-provider. "family" is always
          included — it does not need to be listed explicitly.
        default: 'all'
        required: false

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

env:
  GO_VERSION: '1.25'
  DOCKER_BUILDX_VERSION: 'v0.30.1'
  UPBOUND_REGISTRY: xpkg.upbound.io/wildbitca
  OPENTOFU_VERSION: '1.11.5'
  TERRAFORM_PROVIDER_SOURCE: cloudflare/cloudflare
  TERRAFORM_PROVIDER_VERSION: '5.22.0'
  TERRAFORM_PROVIDER_DOWNLOAD_NAME: terraform-provider-cloudflare
  TERRAFORM_PROVIDER_DOWNLOAD_URL_PREFIX: https://github.com/cloudflare/terraform-provider-cloudflare/releases/download/v5.22.0
  TERRAFORM_NATIVE_PROVIDER_BINARY: terraform-provider-cloudflare_v5.22.0

permissions:
  contents: write

jobs:
  # ── Resolve version + package list ────────────────────────────────────
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      subpackages: ${{ steps.packages.outputs.subpackages }}
    steps:
      - name: Resolve version
        id: version
        run: |
          V="${{ github.event.inputs.version }}"
          echo "version=${V:-${{ github.ref_name }}}" >> $GITHUB_OUTPUT

      - name: Resolve package list
        id: packages
        run: |
          ALL='["access","account","address","ai","api","argo","authenticated",
                "bot","byo","calls","certificate","cloud","cloudflare","cloudforce",
                "connectivity","content","custom","d1","dns","email","firewall",
                "hostname","hyperdrive","image","keyless","leaked","list","load",
                "logpull","logpush","magic","managed","mtls","notification",
                "observatory","organization","origin","page","pages","queue","r2",
                "rate","regional","registrar","schema","secretsstore","snippet",
                "spectrum","sso",
                "stream","tiered","token","total","turnstile","universal","url",
                "user","waiting","web","web3","worker","workers","zero","zone"]'

          INPUT="${{ github.event.inputs.packages }}"

          if [ -z "$INPUT" ] || [ "$INPUT" = "all" ]; then
            SUBPACKAGES=$(echo "$ALL" | tr -d '\n' | jq -c .)
          else
            # Parse comma-separated, strip whitespace and "family" (always built separately)
            SUBPACKAGES=$(echo "$INPUT" \
              | tr ',' '\n' \
              | sed 's/[[:space:]]//g' \
              | grep -v '^family$' \
              | grep -v '^$' \
              | jq -R . \
              | jq -sc .)
          fi

          echo "subpackages=$SUBPACKAGES" >> $GITHUB_OUTPUT
          echo "Will publish sub-providers: $SUBPACKAGES"

  # ── Ensure Upbound repos exist (only for packages being published) ────
  ensure-repos:
    runs-on: ubuntu-24.04
    needs: prepare
    steps:
      - name: Install up CLI
        run: |
          curl -sLo up "https://cli.upbound.io/stable/current/bin/linux_amd64/up"
          chmod +x up
          sudo mv up /usr/local/bin/up

      - name: Authenticate with Upbound
        run: up login -t "${{ secrets.UPBOUND_TOKEN }}"

      - name: Ensure repos exist
        run: |
          # Build the list of repos being published in this run.
          # family-cloudflare is always included.
          SUBPACKAGES='${{ needs.prepare.outputs.subpackages }}'
          REPOS=("provider-family-cloudflare")
          while IFS= read -r pkg; do
            REPOS+=("provider-cloudflare-${pkg}")
          done < <(echo "$SUBPACKAGES" | jq -r '.[]')

          # Only create + publish repos that don't exist yet. Running
          # `up repository update` for all ~60 repos on every publish trips
          # Upbound's "Repository Update Rate Limit". Existing repos are already
          # public+publish, so a get-and-skip is enough. A short retry absorbs
          # transient "Rate Limit Exceeded" responses on create/update.
          retry() {
            local n=0
            until "$@"; do
              n=$((n + 1))
              if [ "$n" -ge 5 ]; then
                echo "command failed after $n attempts: $*" >&2
                return 1
              fi
              echo "attempt $n failed, retrying in $((n * 15))s: $*" >&2
              sleep $((n * 15))
            done
          }
          for repo in "${REPOS[@]}"; do
            if up repository get "$repo" >/dev/null 2>&1; then
              echo "= $repo (exists)"
              continue
            fi
            echo "Creating $repo..."
            retry up repository create "$repo"
            retry up repository update --private=false --publish --force "$repo"
            echo "✓ $repo (created)"
          done

  # ── Family config (ProviderConfig CRDs — published before sub-providers) ──
  family-config:
    runs-on: ubuntu-24.04
    needs: [prepare, ensure-repos]
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: docker/setup-buildx-action@v4
        with: { version: '${{ env.DOCKER_BUILDX_VERSION }}' }

      - name: Checkout
        uses: actions/checkout@v6
        with: { submodules: true }

      - uses: actions/setup-go@v6
        with: { go-version: '${{ env.GO_VERSION }}' }

      - name: Cache Go
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
            .work/pkg
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - run: make vendor vendor.check

      - name: Install CLIs
        run: |
          curl -sLo up "https://cli.upbound.io/stable/current/bin/linux_amd64/up"
          chmod +x up
          sudo mv up /usr/local/bin/up
          curl -sLo docker-credential-up "https://cli.upbound.io/stable/current/bin/linux_amd64/docker-credential-up"
          chmod +x docker-credential-up
          sudo mv docker-credential-up /usr/local/bin/docker-credential-up
          curl -sL "https://raw.githubusercontent.com/crossplane/crossplane/master/install.sh" | sh
          sudo mv crossplane /usr/local/bin/crossplane

      - name: Authenticate with Upbound
        run: |
          up login -t "${{ secrets.UPBOUND_TOKEN }}"
          mkdir -p ~/.docker
          config_file=~/.docker/config.json
          if [ -f "$config_file" ]; then
            jq '.credHelpers["xpkg.upbound.io"] = "up"' "$config_file" > "${config_file}.tmp" && mv "${config_file}.tmp" "$config_file"
          else
            echo '{"credHelpers":{"xpkg.upbound.io":"up"}}' > "$config_file"
          fi

      - name: Build binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -trimpath -installsuffix static \
            -ldflags "-X github.com/wildbitca/provider-upjet-cloudflare/internal/version.Version=${VERSION} -s -w" \
            -o _output/bin/linux_amd64/config \
            ./cmd/provider/config/

      - name: Build image and xpkg
        run: |
          REPO="provider-family-cloudflare"

          BUILD_CTX=$(mktemp -d)
          cp cluster/images/provider-upjet-cloudflare/Dockerfile "${BUILD_CTX}/"
          cp cluster/images/provider-upjet-cloudflare/terraformrc.hcl "${BUILD_CTX}/"
          cp -r _output/bin/ "${BUILD_CTX}/bin"

          docker buildx build \
            --platform linux/amd64 \
            --build-arg SUBPACKAGE=config \
            --build-arg OPENTOFU_VERSION=${OPENTOFU_VERSION} \
            --build-arg TERRAFORM_PROVIDER_SOURCE=${TERRAFORM_PROVIDER_SOURCE} \
            --build-arg TERRAFORM_PROVIDER_VERSION=${TERRAFORM_PROVIDER_VERSION} \
            --build-arg TERRAFORM_PROVIDER_DOWNLOAD_NAME=${TERRAFORM_PROVIDER_DOWNLOAD_NAME} \
            --build-arg TERRAFORM_PROVIDER_DOWNLOAD_URL_PREFIX=${TERRAFORM_PROVIDER_DOWNLOAD_URL_PREFIX} \
            --build-arg TERRAFORM_NATIVE_PROVIDER_BINARY=${TERRAFORM_NATIVE_PROVIDER_BINARY} \
            --cache-from type=gha --cache-to type=gha,mode=max \
            -t build-${REPO}:latest --load \
            "${BUILD_CTX}"

          WORK_DIR=$(mktemp -d)
          mkdir -p "${WORK_DIR}/crds"
          cp package/crds/upjet-cloudflare.*.yaml "${WORK_DIR}/crds/" 2>/dev/null || true

          cat > "${WORK_DIR}/crossplane.yaml" <<'YAML'
          apiVersion: meta.pkg.crossplane.io/v1
          kind: Provider
          metadata:
            name: provider-family-cloudflare
            annotations:
              meta.crossplane.io/maintainer: "Wildbit"
              meta.crossplane.io/source: "https://github.com/wildbitca/provider-upjet-cloudflare"
              meta.crossplane.io/license: "Apache-2.0"
              meta.crossplane.io/description: "Upjet-based Crossplane provider family for the Cloudflare API. Shared ProviderConfig for all Cloudflare sub-providers."
            labels:
              pkg.crossplane.io/provider-family: provider-family-cloudflare
          spec:
            capabilities:
              - SafeStart
          YAML
          sed -i 's/^          //' "${WORK_DIR}/crossplane.yaml"

          crossplane xpkg build \
            --embed-runtime-image="build-${REPO}:latest" \
            --package-root="${WORK_DIR}" \
            --package-file="${WORK_DIR}/${REPO}.xpkg"

          up xpkg push "${UPBOUND_REGISTRY}/${REPO}:${VERSION}" \
            -f "${WORK_DIR}/${REPO}.xpkg"

          echo "Published: ${UPBOUND_REGISTRY}/${REPO}:${VERSION}"

      - name: Append extensions
        continue-on-error: true
        run: |
          up xpkg append --extensions-root=./extensions \
            "${UPBOUND_REGISTRY}/provider-family-cloudflare:${VERSION}"

  # ── Family sub-providers (only selected packages, parallel after family-config) ──
  family-subproviders:
    runs-on: ubuntu-24.04
    needs: [prepare, family-config]
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        subpackage: ${{ fromJson(needs.prepare.outputs.subpackages) }}
    steps:
      - uses: docker/setup-buildx-action@v4
        with: { version: '${{ env.DOCKER_BUILDX_VERSION }}' }

      - name: Checkout
        uses: actions/checkout@v6
        with: { submodules: true }

      - uses: actions/setup-go@v6
        with: { go-version: '${{ env.GO_VERSION }}' }

      - name: Cache Go
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
            .work/pkg
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - run: make vendor vendor.check

      - name: Install CLIs
        run: |
          curl -sLo up "https://cli.upbound.io/stable/current/bin/linux_amd64/up"
          chmod +x up
          sudo mv up /usr/local/bin/up
          curl -sLo docker-credential-up "https://cli.upbound.io/stable/current/bin/linux_amd64/docker-credential-up"
          chmod +x docker-credential-up
          sudo mv docker-credential-up /usr/local/bin/docker-credential-up
          curl -sL "https://raw.githubusercontent.com/crossplane/crossplane/master/install.sh" | sh
          sudo mv crossplane /usr/local/bin/crossplane

      - name: Authenticate with Upbound
        run: |
          up login -t "${{ secrets.UPBOUND_TOKEN }}"
          mkdir -p ~/.docker
          config_file=~/.docker/config.json
          if [ -f "$config_file" ]; then
            jq '.credHelpers["xpkg.upbound.io"] = "up"' "$config_file" > "${config_file}.tmp" && mv "${config_file}.tmp" "$config_file"
          else
            echo '{"credHelpers":{"xpkg.upbound.io":"up"}}' > "$config_file"
          fi

      - name: Build binary
        run: |
          SP="${{ matrix.subpackage }}"
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -trimpath -installsuffix static \
            -ldflags "-X github.com/wildbitca/provider-upjet-cloudflare/internal/version.Version=${VERSION} -s -w" \
            -o _output/bin/linux_amd64/${SP} \
            ./cmd/provider/${SP}/

      - name: Build image, xpkg and publish
        run: |
          SP="${{ matrix.subpackage }}"
          REPO="provider-cloudflare-${SP}"

          BUILD_CTX=$(mktemp -d)
          cp cluster/images/provider-upjet-cloudflare/Dockerfile "${BUILD_CTX}/"
          cp cluster/images/provider-upjet-cloudflare/terraformrc.hcl "${BUILD_CTX}/"
          cp -r _output/bin/ "${BUILD_CTX}/bin"

          docker buildx build \
            --platform linux/amd64 \
            --build-arg SUBPACKAGE=${SP} \
            --build-arg OPENTOFU_VERSION=${OPENTOFU_VERSION} \
            --build-arg TERRAFORM_PROVIDER_SOURCE=${TERRAFORM_PROVIDER_SOURCE} \
            --build-arg TERRAFORM_PROVIDER_VERSION=${TERRAFORM_PROVIDER_VERSION} \
            --build-arg TERRAFORM_PROVIDER_DOWNLOAD_NAME=${TERRAFORM_PROVIDER_DOWNLOAD_NAME} \
            --build-arg TERRAFORM_PROVIDER_DOWNLOAD_URL_PREFIX=${TERRAFORM_PROVIDER_DOWNLOAD_URL_PREFIX} \
            --build-arg TERRAFORM_NATIVE_PROVIDER_BINARY=${TERRAFORM_NATIVE_PROVIDER_BINARY} \
            --cache-from type=gha --cache-to type=gha,mode=max \
            -t build-${REPO}:latest --load \
            "${BUILD_CTX}"

          WORK_DIR=$(mktemp -d)
          mkdir -p "${WORK_DIR}/crds"
          cp package/crds/${SP}.upjet-cloudflare.*.yaml "${WORK_DIR}/crds/" 2>/dev/null || true

          CRD_COUNT=$(find "${WORK_DIR}/crds/" -name '*.yaml' 2>/dev/null | wc -l)
          echo "${SP}: ${CRD_COUNT} CRDs"

          cat > "${WORK_DIR}/crossplane.yaml" <<YAML
          apiVersion: meta.pkg.crossplane.io/v1
          kind: Provider
          metadata:
            name: ${REPO}
            annotations:
              meta.crossplane.io/maintainer: "Wildbit"
              meta.crossplane.io/source: "https://github.com/wildbitca/provider-upjet-cloudflare"
              meta.crossplane.io/license: "Apache-2.0"
              meta.crossplane.io/description: "Crossplane provider for Cloudflare ${SP} resources. Part of provider-family-cloudflare."
            labels:
              pkg.crossplane.io/provider-family: provider-family-cloudflare
          spec:
            dependsOn:
              - provider: ${UPBOUND_REGISTRY}/provider-family-cloudflare
                version: ">= ${VERSION}"
            capabilities:
              - SafeStart
          YAML
          sed -i 's/^          //' "${WORK_DIR}/crossplane.yaml"

          crossplane xpkg build \
            --embed-runtime-image="build-${REPO}:latest" \
            --package-root="${WORK_DIR}" \
            --package-file="${WORK_DIR}/${REPO}.xpkg"

          up xpkg push "${UPBOUND_REGISTRY}/${REPO}:${VERSION}" \
            -f "${WORK_DIR}/${REPO}.xpkg"

          echo "Published: ${UPBOUND_REGISTRY}/${REPO}:${VERSION}"

      - name: Append extensions
        continue-on-error: true
        run: |
          SP="${{ matrix.subpackage }}"
          up xpkg append --extensions-root=./extensions \
            "${UPBOUND_REGISTRY}/provider-cloudflare-${SP}:${VERSION}"

  # ── GitHub Release ────────────────────────────────────────────────────
  release:
    runs-on: ubuntu-24.04
    needs: [prepare, family-subproviders]
    if: always() && needs.family-subproviders.result == 'success'
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${VERSION}" >/dev/null 2>&1; then
            echo "Release ${VERSION} already exists"
          else
            gh release create "${VERSION}" \
              --title "${VERSION}" \
              --generate-notes
          fi
